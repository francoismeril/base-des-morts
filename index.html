<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Morts pour la France – Canton de Pouancé</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial,sans-serif; background:#1a1a2e; color:#eee; }

#topbar {
  padding:6px 12px;
  background:#16213e;
  border-bottom:2px solid #c0392b;
  display:flex; align-items:center; flex-wrap:wrap; gap:6px;
  min-height:46px;
}
#topbar h1 { font-size:14px; font-weight:bold; color:#e74c3c; white-space:nowrap; margin-right:4px; }
#topbar label { font-size:12px; color:#aaa; }

#container { display:flex; height:calc(100vh - 46px); }
#map { flex:1; position:relative; z-index:1; }

#sidepanel {
  width:300px; border-left:1px solid #2a2a4a;
  background:#0d2137; display:flex; flex-direction:column;
  overflow:hidden;
}
#sidepanel-header {
  padding:10px 14px 8px; background:#16213e;
  border-bottom:2px solid #c0392b; flex-shrink:0;
}
#sidepanel-header .label {
  font-size:9px; color:#e74c3c; text-transform:uppercase;
  letter-spacing:1.5px; font-weight:bold; margin-bottom:3px;
}
#sidepanel-title {
  font-size:15px; font-weight:bold; color:#fff; line-height:1.3;
}
#sidepanel-subtitle {
  font-size:11px; color:#7f9ab5; margin-top:3px;
}
#sidepanel-content {
  flex:1; overflow-y:auto; padding:12px;
}
#sidepanel-empty {
  padding:40px 14px; color:#3a5a7a; font-size:13px;
  text-align:center; line-height:1.8;
}

/* Fiche soldat */
.fiche-header {
  background:linear-gradient(135deg,#1a3a5c,#0d2137);
  border-radius:8px; padding:12px; margin-bottom:10px;
  border-left:3px solid var(--conflit-color);
}
.fiche-conflit {
  font-size:10px; font-weight:bold; text-transform:uppercase;
  letter-spacing:1px; color:var(--conflit-color); margin-bottom:6px;
}
.fiche-dates {
  font-size:12px; color:#8fadc8; margin-top:4px;
}

.bloc {
  background:#16213e; border:1px solid #1e3a5a;
  border-radius:6px; padding:10px 12px; margin-bottom:8px;
  font-size:12px; line-height:1.7; color:#b8ccd8;
}
.bloc-titre {
  font-size:9px; font-weight:bold; text-transform:uppercase;
  letter-spacing:1px; color:#5a8ab5; margin-bottom:6px;
}
.bloc strong { color:#d0e4f0; }

.lien {
  display:flex; align-items:center; gap:6px;
  color:#4a9fd4; text-decoration:none;
  font-size:12px; padding:4px 0;
  border-bottom:1px solid #1e3a5a;
}
.lien:last-child { border-bottom:none; }
.lien:hover { color:#7bc4f0; }

/* Pills filtres */
.pill {
  display:flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:20px;
  border:1.5px solid var(--c); font-size:11px;
  color:var(--c); background:transparent;
  cursor:pointer; font-weight:600; user-select:none;
  transition:background 0.15s,color 0.15s;
}
.pill input { display:none; }
.pill.on { background:var(--c); color:#fff; }

/* Recherche */
#searchBox { position:relative; }
#searchInput {
  padding:4px 8px; width:190px;
  border:1px solid #2a4a6a; border-radius:4px;
  font-size:12px; background:#0d2137; color:#eee;
}
#searchResults {
  position:fixed; background:#16213e;
  border:1px solid #c0392b; border-radius:6px;
  box-shadow:0 4px 16px rgba(0,0,0,0.6);
  max-height:200px; overflow-y:auto;
  display:none; z-index:5000; font-size:12px;
  color:#eee; padding:4px 0; min-width:220px;
}
.sr { padding:7px 12px; cursor:pointer; border-bottom:1px solid #1e3a5a; }
.sr:hover { background:#0f3460; }

#compteur { font-size:11px; color:#5a7a9a; }

/* Panneau inconnus */
#panneauInconnus {
  display:none; position:fixed; top:46px; right:0;
  width:300px; max-height:calc(100vh - 46px);
  background:#16213e; border-left:2px solid #e74c3c;
  z-index:3000; overflow-y:auto;
  box-shadow:-4px 4px 20px rgba(0,0,0,0.6);
  display:none; flex-direction:column;
}
#panneauInconnus .pi-header {
  padding:10px 14px; background:#0d1f33;
  border-bottom:1px solid #1e3a5a; position:sticky; top:0;
}
.pi-item {
  padding:8px 14px; cursor:pointer;
  border-bottom:1px solid #1a3050;
  transition:background 0.15s;
}
.pi-item:hover { background:#0f2a40; }

/* Popup Leaflet */
.leaflet-popup-content-wrapper {
  background:#16213e !important; color:#eee !important;
  border:1px solid #c0392b !important; border-radius:8px !important;
  box-shadow:0 4px 16px rgba(0,0,0,0.5) !important;
}
.leaflet-popup-tip { background:#16213e !important; }
.leaflet-popup-content { margin:10px 14px !important; font-size:12px; }

/* Mobile */
@media(max-width:768px){
  #container { flex-direction:column; }
  #map { width:100%; height:60vh; }
  #sidepanel { width:100%; height:40vh; border-left:none; border-top:2px solid #c0392b; }
}
</style>
</head>
<body>

<div id="topbar">
  <h1>⚔️ Morts pour la France &mdash; Canton de Pouancé</h1>

  <div id="searchBox">
    <input type="text" id="searchInput" placeholder="Rechercher un soldat…">
    <div id="searchResults"></div>
  </div>

  <label>Conflit :</label>
  <label class="pill on" id="p39" style="--c:#e74c3c;">
    <input type="checkbox" id="f39" checked onchange="updateMap();togglePill(this,'p39');syncBtnTout()"> 1939-1945
  </label>
  <label class="pill on" id="p14" style="--c:#e67e22;">
    <input type="checkbox" id="f14" checked onchange="updateMap();togglePill(this,'p14');syncBtnTout()"> 1914-1918
  </label>
  <label class="pill on" id="pindo" style="--c:#27ae60;">
    <input type="checkbox" id="findo" checked onchange="updateMap();togglePill(this,'pindo');syncBtnTout()"> Indochine
  </label>
  <label class="pill on" id="palg" style="--c:#2980b9;">
    <input type="checkbox" id="falg" checked onchange="updateMap();togglePill(this,'palg');syncBtnTout()"> Algérie
  </label>

  <button id="btnTout" onclick="toggleTout()"
    style="padding:3px 10px;font-size:11px;background:#c0392b;color:white;border:none;border-radius:4px;cursor:pointer;">
    ✖ Tout désactiver
  </button>
  <button id="btnInconnus" onclick="toggleInconnus()"
    style="padding:3px 10px;font-size:11px;background:#444;color:white;border:none;border-radius:4px;cursor:pointer;">
    ❓ Lieu inconnu (49)
  </button>
  <span id="compteur"></span>
</div>

<!-- Panneau lieu inconnu -->
<div id="panneauInconnus" style="display:none;position:fixed;top:46px;right:300px;width:300px;max-height:calc(100vh - 46px);background:#16213e;border-left:2px solid #e74c3c;border-right:1px solid #1e3a5a;z-index:3000;overflow-y:auto;box-shadow:-4px 4px 20px rgba(0,0,0,0.6);">
  <div style="padding:10px 14px;background:#0d1f33;border-bottom:1px solid #1e3a5a;position:sticky;top:0;">
    <div style="font-size:9px;color:#e74c3c;text-transform:uppercase;letter-spacing:1px;font-weight:bold;margin-bottom:4px;">⚠ Lieu de décès non localisé</div>
    <div style="font-size:11px;color:#7f9ab5;line-height:1.5;">49 soldats figurant sur les monuments dont le lieu de décès n'a pu être géolocalisé.</div>
  </div>
  <div id="listeInconnus"></div>
</div>

<div id="container">
  <div id="map"></div>
  <div id="sidepanel">
    <div id="sidepanel-header">
      <div class="label">Fiche du soldat</div>
      <div id="sidepanel-title">—</div>
      <div id="sidepanel-subtitle"></div>
    </div>
    <div id="sidepanel-content">
      <div id="sidepanel-empty">
        🎖️ Cliquez sur un marqueur<br>pour afficher la fiche du soldat.
        <br><br>
        <span style="font-size:11px;color:#2a4a6a;">
          618 soldats géolocalisés<br>
          49 lieux non retrouvés
        </span>
      </div>
      <div id="panel-infos" style="display:none;"></div>
    </div>
  </div>
</div>

const map = L.map("map").setView([49.5, 5.5], 5);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

const cluster = L.markerClusterGroup({
  maxClusterRadius:40, spiderfyOnMaxZoom:true,
  showCoverageOnHover:false, disableClusteringAtZoom:13
});
map.addLayer(cluster);
const idx = {};

function mkIcon(conflit) {
  const c = COLORS[conflit]||"#aaa";
  return L.divIcon({
    className:"",
    html:`<svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="${c}" stroke="white" stroke-width="2"/></svg>`,
    iconSize:[18,18], iconAnchor:[9,9], popupAnchor:[0,-11]
  });
}

/* ── Fiche ── */
function afficherInfos(s) {
  const c = COLORS[s.conflit]||"#aaa";
  document.getElementById("sidepanel-title").textContent = s.nom;
  document.getElementById("sidepanel-subtitle").textContent =
    [s.commune, s.commune_nouvelle].filter(Boolean).join(" · ");
  document.getElementById("sidepanel-empty").style.display = "none";

  let h = "";

  /* En-tête conflit + dates clés */
  const naissance = [s.date_naissance, s.lieu_naissance].filter(Boolean).join(" à ");
  const deces     = [s.date_deces, s.lieu_deces, s.pays_deces !== 'France' ? s.pays_deces : ''].filter(Boolean).join(" · ");
  h += `<div class="fiche-header" style="--conflit-color:${c}">
    <div class="fiche-conflit">⚔️ ${s.conflit}</div>
    ${s.grade ? `<div style="font-size:13px;color:#d0e4f0;font-weight:bold;">${s.grade}</div>` : ""}
    ${s.regiment ? `<div style="font-size:12px;color:#8fadc8;">${s.regiment}</div>` : ""}
    <div class="fiche-dates">
      ${naissance ? `🎂 ${naissance}<br>` : ""}
      ${deces     ? `✝ ${deces}`          : ""}
      ${s.age     ? ` <span style="color:#5a7a9a;">(${s.age})</span>` : ""}
    </div>
  </div>`;

  /* Circonstances */
  if (s.cause) {
    h += `<div class="bloc">
      <div class="bloc-titre">📋 Circonstances / Citations</div>
      ${s.cause.replace(/\n/g,"<br>")}
    </div>`;
  }

  /* Sépulture */
  if (s.sepulture || s.ville_sepulture) {
    const sep = [s.sepulture?.replace(/\n/g," — "), s.ville_sepulture, s.dept_sepulture].filter(Boolean).join("<br>");
    h += `<div class="bloc">
      <div class="bloc-titre">🪦 Sépulture</div>
      ${sep}
    </div>`;
  }

  /* Liens */
  let liens = "";
  if (s.lien_mdh)
    liens += `<a href="${s.lien_mdh}" target="_blank" class="lien">🎖️ Mémoire des Hommes (SGA Défense)</a>`;
  if (s.lien_arolsen)
    liens += `<a href="${s.lien_arolsen}" target="_blank" class="lien">📂 Archives Arolsen (déportation)</a>`;
  if (s.cote_archives)
    liens += `<div class="lien" style="color:#5a8ab5;cursor:default;">🗂️ Cote Archives : ${s.cote_archives}</div>`;
  if (liens)
    h += `<div class="bloc"><div class="bloc-titre">🔗 Sources</div>${liens}</div>`;

  /* Photos monument */
  const mon = MONUMENTS[s.commune];
  if (mon) {
    let photos = `<div class="bloc">
      <div class="bloc-titre">🏛️ Monument aux morts — ${s.commune}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">`;
    for (let i = 1; i <= mon.nb; i++) {
      const num = String(i).padStart(2, "0");
      const url = `${BASE_IMG}${mon.dossier}/${num}.jpg`;
      photos += `<img src="${url}"
        style="width:calc(50% - 3px);border-radius:4px;cursor:pointer;object-fit:cover;height:90px;"
        onclick="ouvrirPhoto('${url}','${s.commune.replace(/'/g,"\\'")}')"
        onerror="this.style.display='none'">`;
    }
    photos += `</div></div>`;
    h += photos;
  }

  document.getElementById("panel-infos").innerHTML = h;
  document.getElementById("panel-infos").style.display = "block";
}

/* ── Markers ── */
function buildMarker(s) {
  const m = L.marker([s.lat,s.lng],{icon:mkIcon(s.conflit)});
  const pop = `<strong>${s.nom}</strong><br>
    <span style="color:#aaa;font-size:11px;">${s.conflit}</span><br>
    <span style="font-size:11px;">${[s.lieu_deces,s.pays_deces].filter(Boolean).join(", ")}</span>
    ${s.date_deces ? `<br><span style="font-size:11px;color:#aaa;">✝ ${s.date_deces}</span>` : ""}`;
  m.bindPopup(pop)
   .bindTooltip(s.nom,{direction:"top",offset:[0,-11],opacity:0.9})
   .on("click",()=>afficherInfos(s));
  idx[normalize(s.nom)] = {marker:m, data:s};
  return m;
}

/* ── Filtres ── */
function togglePill(cb, pillId) {
  document.getElementById(pillId).classList.toggle("on", cb.checked);
}

function updateMap() {
  cluster.clearLayers();
  const f39   = document.getElementById("f39").checked;
  const f14   = document.getElementById("f14").checked;
  const findo = document.getElementById("findo").checked;
  const falg  = document.getElementById("falg").checked;
  const aucun = !f39 && !f14 && !findo && !falg;
  let n = 0;
  for (const s of SOLDATS) {
    if (!aucun) {
      if (s.conflit==="1939-1945"      && !f39)   continue;
      if (s.conflit==="1914-1918"      && !f14)   continue;
      if (s.conflit==="Indochine"      && !findo) continue;
      if (s.conflit==="Guerre Algérie" && !falg)  continue;
    }
    cluster.addLayer(buildMarker(s));
    n++;
  }
  document.getElementById("compteur").textContent = n+" soldat"+(n>1?"s":"")+" affiché"+(n>1?"s":"");
}

function toggleTout() {
  const btn = document.getElementById("btnTout");
  const toutActif = ["f39","f14","findo","falg"].every(id => document.getElementById(id).checked);
  const pills = ["p39","p14","pindo","palg"];
  if (toutActif) {
    // Tout désactiver
    ["f39","f14","findo","falg"].forEach((id,i) => {
      document.getElementById(id).checked = false;
      document.getElementById(pills[i]).classList.remove("on");
    });
    btn.textContent = "👁 Tout afficher";
    btn.style.background = "#444";
  } else {
    // Tout activer
    ["f39","f14","findo","falg"].forEach((id,i) => {
      document.getElementById(id).checked = true;
      document.getElementById(pills[i]).classList.add("on");
    });
    btn.textContent = "✖ Tout désactiver";
    btn.style.background = "#c0392b";
  }
  updateMap();
}

// Synchroniser le bouton quand on coche/décoche manuellement
function syncBtnTout() {
  const btn = document.getElementById("btnTout");
  const toutActif = ["f39","f14","findo","falg"].every(id => document.getElementById(id).checked);
  btn.textContent = toutActif ? "✖ Tout désactiver" : "👁 Tout afficher";
  btn.style.background = toutActif ? "#c0392b" : "#444";
}

/* ── Inconnus ── */
function toggleInconnus() {
  const p = document.getElementById("panneauInconnus");
  const btn = document.getElementById("btnInconnus");
  const open = p.style.display === "none" || p.style.display === "";
  p.style.display = open ? "block" : "none";
  btn.style.background = open ? "#c0392b" : "#444";
}

(function buildInconnus() {
  const container = document.getElementById("listeInconnus");
  let selected = null;
  INCONNUS.forEach(s => {
    const c = COLORS[s.conflit]||"#aaa";
    const d = document.createElement("div");
    d.className = "pi-item";
    d.innerHTML =
      `<div style="font-size:12px;font-weight:bold;color:#d0e4f0;">${s.nom}</div>`+
      `<div style="font-size:10px;margin-top:2px;">`+
        `<span style="color:${c};font-weight:bold;">${s.conflit}</span>`+
        (s.commune ? ` · <span style="color:#6a8aaa;">${s.commune}</span>` : "")+
        (s.grade   ? ` · <span style="color:#6a8aaa;">${s.grade}</span>`   : "")+
      `</div>`;
    d.addEventListener("click", () => {
      // Désélectionner le précédent
      if (selected) selected.style.background = "transparent";
      d.style.background = "#0f3460";
      d.style.borderLeft = "3px solid #e74c3c";
      selected = d;
      // Afficher la fiche dans le sidepanel
      afficherInfos(s);
      // Sur mobile : fermer le panneau pour voir la fiche
      if (window.innerWidth <= 768) {
        document.getElementById("panneauInconnus").style.display = "none";
        document.getElementById("btnInconnus").style.background = "#444";
        document.getElementById("sidepanel").classList.add("open");
      }
    });
    container.appendChild(d);
  });
})();

/* ── Recherche ── */
const si = document.getElementById("searchInput");
const sr = document.getElementById("searchResults");
si.addEventListener("input",()=>{
  const q = normalize(si.value);
  sr.innerHTML="";
  if(q.length<2){sr.style.display="none";return;}
  const all = [...SOLDATS,...INCONNUS];
  const hits = all.filter(s=>normalize(s.nom).includes(q)).slice(0,12);
  if(!hits.length){sr.style.display="none";return;}
  hits.forEach(s=>{
    const d=document.createElement("div");
    d.className="sr";
    d.innerHTML=`${s.nom} <span style="color:${COLORS[s.conflit]||"#aaa"};font-size:10px;">— ${s.conflit}</span>`+
      (s.commune?`<span style="color:#5a7a9a;font-size:10px;"> · ${s.commune}</span>`:"");
    d.addEventListener("click",()=>{
      sr.style.display="none"; si.value=s.nom;
      afficherInfos(s);
      if(s.lat){ map.setView([s.lat,s.lng],12); const e=idx[normalize(s.nom)]; if(e) e.marker.openPopup(); }
    });
    sr.appendChild(d);
  });
  const r=si.getBoundingClientRect();
  sr.style.left=r.left+"px"; sr.style.top=(r.bottom+window.scrollY)+"px";
  sr.style.width=r.width+"px"; sr.style.display="block";
});
document.addEventListener("click",e=>{
  if(!si.contains(e.target)&&!sr.contains(e.target)) sr.style.display="none";
});

function ouvrirPhoto(url, commune) {
  const mon = MONUMENTS[commune];
  if (!mon) return;
  const imgs = [];
  for (let i = 1; i <= mon.nb; i++) {
    imgs.push(`${BASE_IMG}${mon.dossier}/${String(i).padStart(2,"0")}.jpg`);
  }
  let cur = imgs.indexOf(url);
  let zoom = 1;
  let tx = 0, ty = 0;
  let dragging = false, startX, startY, startTx, startTy;

  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;overflow:hidden;";

  const img = document.createElement("img");
  img.style.cssText = "max-width:85%;max-height:85%;border-radius:6px;box-shadow:0 0 30px rgba(0,0,0,0.8);transition:transform 0.1s;cursor:grab;user-select:none;";
  img.src = url;

  const applyTransform = () => {
    img.style.transform = `translate(${tx}px,${ty}px) scale(${zoom})`;
  };

  const resetTransform = () => { zoom=1; tx=0; ty=0; applyTransform(); img.style.cursor="grab"; };

  // Zoom molette
  overlay.addEventListener("wheel", e => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.15 : 0.87;
    zoom = Math.min(Math.max(zoom * delta, 1), 8);
    if (zoom === 1) { tx=0; ty=0; }
    applyTransform();
    img.style.cursor = zoom > 1 ? "grab" : "grab";
  }, { passive: false });

  // Drag
  img.addEventListener("mousedown", e => {
    if (zoom <= 1) return;
    e.preventDefault();
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    img.style.cursor = "grabbing";
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener("mouseup", () => {
    dragging = false;
    img.style.cursor = zoom > 1 ? "grab" : "grab";
  });

  // Touch drag (mobile)
  img.addEventListener("touchstart", e => {
    if (zoom <= 1 || e.touches.length !== 1) return;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startTx = tx; startTy = ty; dragging = true;
  });
  img.addEventListener("touchmove", e => {
    if (!dragging) return;
    e.preventDefault();
    tx = startTx + (e.touches[0].clientX - startX);
    ty = startTy + (e.touches[0].clientY - startY);
    applyTransform();
  }, { passive: false });
  img.addEventListener("touchend", () => { dragging = false; });

  // Double-clic reset zoom
  img.addEventListener("dblclick", e => { e.stopPropagation(); resetTransform(); });

  // Compteur
  const counter = document.createElement("div");
  counter.style.cssText = "position:absolute;top:14px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:20px;pointer-events:none;";
  const updateCounter = () => { counter.textContent = `${cur+1} / ${mon.nb}`; };
  updateCounter();

  // Hint zoom
  const hint = document.createElement("div");
  hint.textContent = "Molette pour zoomer · Double-clic pour réinitialiser";
  hint.style.cssText = "position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#aaa;font-size:11px;background:rgba(0,0,0,0.5);padding:3px 10px;border-radius:20px;pointer-events:none;white-space:nowrap;";

  // Fermer
  const btnClose = document.createElement("div");
  btnClose.textContent = "✕";
  btnClose.style.cssText = "position:absolute;top:14px;right:20px;color:#fff;font-size:20px;cursor:pointer;background:rgba(0,0,0,0.5);width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:2;";
  btnClose.onclick = e => { e.stopPropagation(); document.body.removeChild(overlay); };

  // Flèches
  const btnStyle = "position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:36px;cursor:pointer;background:rgba(0,0,0,0.4);width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:50%;user-select:none;z-index:2;";

  const btnPrev = document.createElement("div");
  btnPrev.innerHTML = "&#8249;";
  btnPrev.style.cssText = btnStyle + "left:16px;";
  btnPrev.style.display = mon.nb <= 1 ? "none" : "flex";
  btnPrev.onclick = e => {
    e.stopPropagation();
    cur = (cur - 1 + mon.nb) % mon.nb;
    img.src = imgs[cur]; resetTransform(); updateCounter();
  };

  const btnNext = document.createElement("div");
  btnNext.innerHTML = "&#8250;";
  btnNext.style.cssText = btnStyle + "right:16px;";
  btnNext.style.display = mon.nb <= 1 ? "none" : "flex";
  btnNext.onclick = e => {
    e.stopPropagation();
    cur = (cur + 1) % mon.nb;
    img.src = imgs[cur]; resetTransform(); updateCounter();
  };

  // Fermer fond (seulement si pas en train de dragger)
  overlay.addEventListener("click", e => {
    if (e.target === overlay) document.body.removeChild(overlay);
  });

  overlay.appendChild(img);
  overlay.appendChild(counter);
  overlay.appendChild(hint);
  overlay.appendChild(btnClose);
  overlay.appendChild(btnPrev);
  overlay.appendChild(btnNext);
  document.body.appendChild(overlay);
}

updateMap();
</script>
